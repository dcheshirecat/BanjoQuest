name: Build BanjoQuest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Scaffold the Android project ──────────────────────────────────────

      - name: Create project structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/banjoquest/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

      - name: Copy index.html into assets
        run: cp index.html app/src/main/assets/index.html

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/banjoquest/app/MainActivity.java << 'JAVA'
          package com.banjoquest.app;
          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVA

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.banjoquest.app">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:allowBackup="true"
                android:label="@string/app_name"
                android:theme="@style/Theme.AppCompat.NoActionBar">
              <activity android:name=".MainActivity" android:exported="true"
                  android:screenOrientation="portrait">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          XML

      - name: Write layout
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
            <WebView android:id="@+id/webview"
                android:layout_width="match_parent" android:layout_height="match_parent"/>
          </FrameLayout>
          XML

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">BanjoQuest</string></resources>
          XML

      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
            compileSdk 34
            namespace 'com.banjoquest.app'
            defaultConfig {
              applicationId "com.banjoquest.app"
              minSdk 24
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            signingConfigs {
              release {
                storeFile file("keystore.jks")
                storePassword "banjoquest"
                keyAlias "banjoquest"
                keyPassword "banjoquest"
              }
            }
            buildTypes {
              release {
                minifyEnabled false
                signingConfig signingConfigs.release
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'GRADLE'
          plugins { id 'com.android.application' version '8.1.0' apply false }
          GRADLE

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "BanjoQuest"
          include ':app'
          GRADLE

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # ── Generate single-use keystore ──────────────────────────────────────

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias banjoquest \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass banjoquest \
            -keypass banjoquest \
            -dname "CN=BanjoQuest, OU=App, O=Personal, L=City, S=State, C=US"

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BanjoQuest-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
