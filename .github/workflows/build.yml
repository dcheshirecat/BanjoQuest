name: Build APK (Ephemeral Keystore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      KEY_ALIAS: temp-release-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set keystore path
        run: echo "KEYSTORE_FILE=$RUNNER_TEMP/release-keystore.jks" >> "$GITHUB_ENV"

      - name: Generate temporary signing passwords
        run: |
          echo "KEYSTORE_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Generate one-time keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_FILE" \
            -storetype JKS \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 7 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=GitHub Actions, OU=CI, O=Personal Build, L=NA, S=NA, C=US"

      - name: Build release APK
        run: ./gradlew clean assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BanjoQuest-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Delete temporary keystore
        if: always()
        run: rm -f "$KEYSTORE_FILE"
