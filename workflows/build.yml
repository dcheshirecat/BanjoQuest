name: Build & Sign APK

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

env:
  KEYSTORE_PASSWORD: temp123
  KEY_ALIAS: banjoalias
  KEY_PASSWORD: temp123

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'

  - name: Make gradlew executable
    run: chmod +x gradlew

  # 🔐 Generate keystore ONLY if it doesn't exist
  - name: Generate keystore (one-time)
    run: |
      if [ ! -f app/keystore.jks ]; then
        echo "No keystore found, generating one..."
        keytool -genkeypair \
          -storetype PKCS12 \
          -keystore app/keystore.jks \
          -alias $KEY_ALIAS \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass $KEYSTORE_PASSWORD \
          -keypass $KEY_PASSWORD \
          -dname "CN=BanjoQuest,O=Personal,C=US"
      else
        echo "Keystore already exists, skipping generation."
      fi

  # 🏗️ Build release APK
  - name: Build release APK
    run: ./gradlew assembleRelease
    env:
      KEYSTORE_PASSWORD: $KEYSTORE_PASSWORD
      KEY_ALIAS: $KEY_ALIAS
      KEY_PASSWORD: $KEY_PASSWORD

  # 📦 Upload APK
  - name: Upload APK artifact
    uses: actions/upload-artifact@v4
    with:
      name: BanjoQuest-release
      path: app/build/outputs/apk/release/app-release.apk
      retention-days: 14

  # 🔑 OPTIONAL: Download this once and store it safely!
  - name: Upload keystore (SAVE THIS!)
    uses: actions/upload-artifact@v4
    with:
      name: keystore-backup
      path: app/keystore.jks
      retention-days: 1
